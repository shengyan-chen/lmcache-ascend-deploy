chunk_size: 256
local_cpu: True
max_local_cpu_size: 50
# use_layerwise: False
# save_decode_cache: True
enable_async_loading: False
save_only_first_rank: False
store_async: True
# remote_url: "mooncakestore://7.242.108.184:50051/"
# # numa_mode: "auto"
# local_disk: "file:///workspace/csy/lmcache_local_disk"
# max_local_disk_size: 500

internal_api_server_enabled: True
internal_api_server_host: "0.0.0.0"
internal_api_server_port_start: 3999

# P2P configurations
enable_p2p: True
p2p_host: "localhost" # replace with the host ip
p2p_init_ports: [9950, 9951, 9952, 9953, 9954, 9955, 9956, 9957] # per TP instance
p2p_lookup_ports: [9970, 9971, 9972, 9973, 9974, 9975, 9976, 9977] # per TP instance
transfer_channel: "hccl"
p2p_use_npu: True # Intermediate buffer on NPU into which directly pulls. If not big enough fails
p2p_pull_mode: True # REad vs write
p2p_delay_pull: True # TO HBM
# 128MB
p2p_npu_buffer_size: 134217728

# Controller configurations
enable_controller: True
lmcache_instance_id: "minimax27_lmcache_2p2d_prefiller_1"
controller_pull_url: "localhost:9800" # replace with the controller pull url
controller_reply_url: "localhost:9900" # replace with the controller reply url
lmcache_worker_ports: [9940, 9941, 9942, 9943, 9944, 9945, 9946, 9947] # per TP instance

extra_config:
  lookup_backoff_time: 0.001
  # Host-staging one-sided reads. Lives in HcclChannel, so this REQUIRES
  # transfer_channel: "hccl" (NOT "hccl_onesided") and p2p_delay_pull: True.
  # The producer registers ONE bounded, pinned host arena and serves one-sided
  # reads out of staged copies, instead of registering the full CPU KV pool
  # (which trips the >10GB device registration limit). The reader pulls into
  # the NPU ping-pong buffers (p2p_use_npu / p2p_npu_buffer_size).
  use_host_staging: True
  # Arena size in bytes. Auto-carved into chunk-sized slots
  # (slots = os_staging_bytes // chunk_bytes; ~12 MB/chunk = 24 KB/token * 512).
  # This is the in-flight pull capacity: when all slots are busy, staging caps
  # the hit (free_only) and the reader recomputes the rest -- no blocking.
  # Keep SAFELY BELOW the ~10GB registration ceiling. NOTE: os_num_slots /
  # os_slot_bytes belong to the hccl_onesided ring and are ignored here.
  os_staging_bytes: 8589934592  # 8 GiB (~680 slots @ 12 MB); tune to your limit
  # Optional lease knobs (defaults shown). The producer stamps p2p_pull_pending_ttl
  # as the slot lease; the reader subtracts p2p_pull_lease_guard_s before each
  # read so it finishes before reclaim. Keep ttl >= os_ack_timeout_sec.
  # p2p_pull_pending_ttl: 60.0
  # p2p_pull_lease_guard_s: 15.0

