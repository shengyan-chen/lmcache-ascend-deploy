chunk_size: 256
local_cpu: true
max_local_cpu_size: 80
enable_async_loading: false

store_async: true

# Reuse KV only from this Prefill node's local CPU cache.
retrieve_locations:
  - "LocalCPUBackend"

# internal_api_server_enabled: true
# internal_api_server_host: "0.0.0.0"
# internal_api_server_port_start: 3999

# Prefill -> Decode transfer. PDBackend is independent of P2PBackend.
enable_pd: true
transfer_channel: "hccl"
pd_role: "sender"
pd_pull_mode: true
pd_delay_pull: true

pd_pull_done_port: [7700, 7701, 7702, 7703, 7704, 7705, 7706, 7707]
# pd_pull_done_port: [7700, 7701, 7702, 7703, 7704, 7705, 7706, 7707, 7708, 7709, 7710, 7711, 7712, 7713, 7714, 7715]


# Stage the sender-side PD payload in host memory so NPU memory can be released.
pd_use_cpu_offload: true
pd_cpu_buffer_size: 21474836480

# The sender binds the pull-done listeners on the Prefill address.
pd_peer_host: "192.168.0.110"
# The LMCache proxy is expected to run on the Prefill node.
pd_proxy_host: "192.168.0.110"
pd_proxy_port: 7500
pd_buffer_size: 134217728
pd_buffer_device: "npu"

save_unfull_chunk: true

extra_config:
  lookup_backoff_time: 0.001
  save_only_first_rank: false
